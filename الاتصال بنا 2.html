<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوفينغ هومز - صفحة الاتصال</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    body {
        font-family: 'Cairo', sans-serif;
        background: linear-gradient(to bottom, #e8f5e9, #ffffff);
        margin: 0;
        padding: 0;
        direction: rtl;
        color: #333;
    }

    header {
        background: linear-gradient(90deg, #2E7D32, #1B5E20);
        color: #fff;
        text-align: center;
        padding: 40px 20px;
        font-size: 32px;
        font-weight: 700;
        letter-spacing: 1px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        text-transform: uppercase;
    }

    main {
        display: flex;
        justify-content: center;
        padding: 60px 20px;
    }

    .contact-form {
        background: #ffffff;
        padding: 40px;
        border-radius: 25px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        width: 100%;
        max-width: 500px;
        transition: transform 0.3s, box-shadow 0.3s;
    }

    .contact-form:hover {
        transform: translateY(-5px);
        box-shadow: 0 25px 60px rgba(0,0,0,0.25);
    }

    .contact-form h2 {
        color: #2E7D32;
        text-align: center;
        margin-bottom: 30px;
        font-size: 28px;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
    }

    .contact-form label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #2E7D32;
    }

    .contact-form input,
    .contact-form textarea {
        width: 100%;
        padding: 12px 15px;
        margin-bottom: 20px;
        border-radius: 12px;
        border: 1px solid #ccc;
        box-sizing: border-box;
        resize: vertical;
        transition: border 0.3s, box-shadow 0.3s;
        font-size: 16px;
    }

    .contact-form input:focus,
    .contact-form textarea:focus {
        outline: none;
        border-color: #2E7D32;
        box-shadow: 0 0 8px rgba(46,125,50,0.4);
    }

    .contact-form button {
        background: linear-gradient(90deg, #2E7D32, #1B5E20);
        color: #fff;
        border: none;
        padding: 14px;
        border-radius: 12px;
        cursor: pointer;
        width: 100%;
        font-size: 18px;
        font-weight: 600;
        transition: background 0.3s, transform 0.3s;
    }

    .contact-form button:hover {
        background: linear-gradient(90deg, #1B5E20, #2E7D32);
        transform: scale(1.03);
    }

    footer {
        background-color: #2E7D32;
        color: white;
        text-align: center;
        padding: 25px 20px;
        margin-top: 40px;
        font-weight: 600;
        font-size: 16px;
        box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
    }

    @media (max-width: 768px) {
        header { font-size: 26px; padding: 30px 15px; }
        .contact-form { padding: 30px; }
        .contact-form h2 { font-size: 24px; }
        .contact-form input,
        .contact-form textarea { font-size: 15px; padding: 10px; }
        .contact-form button { font-size: 16px; padding: 12px; }
    }
</style>
</head>
<body>

<header>اتصل بفندق لوفينغ هومز</header>

<main>
    <div class="contact-form">
        <h2>نموذج الاتصال</h2>
        <form action="#" method="post">
            <label for="name">الاسم الكامل</label>
            <input type="text" id="name" name="name" placeholder="اكتب اسمك الكامل" required>

            <label for="email">البريد الإلكتروني</label>
            <input type="email" id="email" name="email" placeholder="example@domain.com" required>

            <label for="subject">الموضوع</label>
            <input type="text" id="subject" name="subject" placeholder="موضوع الرسالة" required>

            <label for="message">الرسالة</label>
            <textarea id="message" name="message" rows="5" placeholder="اكتب رسالتك هنا" required></textarea>

            <button type="submit">إرسال الرسالة</button>
        </form>
    </div>
</main>

<footer>حقوق الطبع والنشر &copy; 2026 لوفينغ هومز</footer>

</body>
</html>
